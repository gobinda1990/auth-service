spring.application.name=auth-service
server.servlet.context-path=/api

spring.profiles.active=stage

# Common database driver and init platform
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.platform=postgresql

# HikariCP Performance Tuning (common)
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,logfile,metrics,prometheus,circuitbreakers
management.endpoint.prometheus.access=read-only
management.endpoint.auditevents.access=none
management.endpoints.access.default=read-only
management.endpoint.health.show-details=always
logging.level.org.springframework.boot.actuate=INFO

# JWT Configuration
jwt.key-id=auth-server-key
jwt.private-key-path=classpath:keys/private.pem
jwt.public-key-path=classpath:keys/public.pem
jwt.access-expiration=900000       
jwt.refresh-expiration=86400000    
jwt.cookie.domain=yourdomain.com

# CORS
app.cors.allowed-origins=*

# Logging
logging.config=classpath:log4j.properties
spring.mvc.dispatch-options-request=true
spring.web.resources.add-mappings=false

# ===============================
# 💾 REDIS CONFIGURATION
# ===============================
spring.data.redis.host=10.153.43.8
spring.data.redis.port=6379
spring.data.redis.password=        # leave empty if no auth
spring.data.redis.database=0
spring.data.redis.timeout=6000ms

# Optional: Lettuce connection pool (recommended)
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.time-between-eviction-runs=10s




